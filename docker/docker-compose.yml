services:

  db:
    image: postgres:16-alpine          # alpine = imagem mínima
    container_name: tasks_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-tasks_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-tasks_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s             # Dá tempo ao Postgres inicializar

  api:
    build:
      context: .
      target: runtime               # Usa só o stage de produção
    container_name: tasks_api
    restart: unless-stopped
    ports:
      - "${API_PORT:-5000}:5000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-tasks_db}
      FLASK_ENV: production
    depends_on:
      db:
        condition: service_healthy  # ← A linha que demonstra maturidade
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
    driver: local